<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <title>Fitness App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness App">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-152x152.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-72x72.png">
    
    <!-- PWA JavaScript -->
    <script src="pwa.js" defer></script>
</head>
<body>
    <header>
        <h1>Fitness App</h1>
    </header>
    <main id="content">
        <div id="home" class="page">
            <div class="exercise-card" onclick="openExerciseModal('Squats')">
                <span class="exercise-name">Exercise 1: Squats</span>
                <div class="pr-info" id="squats-pr">PR: Not set</div>
            </div>
            <div class="exercise-card" onclick="openExerciseModal('Bench Press')">
                <span class="exercise-name">Exercise 2: Bench Press</span>
                <div class="pr-info" id="bench-press-pr">PR: Not set</div>
            </div>
            <div class="exercise-card" onclick="openExerciseModal('Deadlift')">
                <span class="exercise-name">Exercise 3: Deadlift</span>
                <div class="pr-info" id="deadlift-pr">PR: Not set</div>
            </div>
        </div>
    </main>
    <footer>
        <nav>
            <button>
                <i class="fas fa-home"></i>
                <span><a href="index.html">Home</a></span>
            </button>
            <button>
                <i class="fas fa-chart-line"></i>
                <span><a href="progress.html">Progress</a></span>
            </button>
            <button>
                <i class="fas fa-cog"></i>
                <span><a href="settings.html">Settings</a></span>
            </button>
        </nav>
    </footer>

    <!-- Modal for Exercise Input -->
    <div id="exerciseModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeExerciseModal()">&times;</span>
            <h2 id="exerciseName"></h2>
            <form id="exerciseForm">
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
